name: absensi_kuliah
description: "Aplikasi Absensi Kuliah - Flutter"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  local_auth: ^2.3.0
  camera: ^0.11.1
  geolocator: ^13.0.2
  file_picker: ^8.1.7
  permission_handler: ^11.3.1
  google_fonts: ^6.2.1
  intl: ^0.19.0
  http: ^1.6.0
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^9.2.4
  provider: ^6.1.2
  url_launcher: ^6.3.2
  screen_brightness: ^2.1.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
